<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Multiplayer Rock Paper Scissors</h1>

    <div id="game">
        <div id="choices">
            <button class="choices" data-choice="rock">✊</button>
            <button class="choices" data-choice="paper">🖐️</button>
            <button class="choices" data-choice="scissor">✌️</button>
        </div>

        <p id="status">Waiting for opponent...</p>
        <p id="result"></p>
    </div>

    <script src="client.js"></script>
  </body>
</html>
