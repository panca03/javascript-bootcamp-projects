<!doctype html>

<html>
  <head>
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Color Picker</h1>
      <input type="color" id="color-picker" />

        id="color-input"
        placeholder="Enter color name or hex"
      />
      <p>Chose a color to change the background</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
